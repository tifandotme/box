name: "Setup Kamal"
description: "Setup Kamal with Ruby"

runs:
  using: "composite"
  steps:
    - uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
      with:
        ruby-version: 4
        bundler-cache: true

    - run: gem install kamal --no-document
      shell: bash
